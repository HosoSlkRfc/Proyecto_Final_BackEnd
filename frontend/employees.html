<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Empleados | SGRH-Employees</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

  <!-- ── Sidebar ── -->
  <aside class="sidebar">
    <div class="sidebar-header">
      <div class="logo">SGRH <span>Employees</span></div>
      <small>Gestión de Recursos Humanos</small>
    </div>
    <nav class="sidebar-nav">
      <a href="index.html" data-page="dashboard"><span class="icon">📊</span> Dashboard</a>
      <a href="employees.html" data-page="employees"><span class="icon">👥</span> Empleados</a>
      <a href="departments.html" data-page="departments"><span class="icon">🏢</span> Departamentos</a>
      <a href="incidencias.html" data-page="incidencias"><span class="icon">📋</span> Incidencias RRHH</a>
    </nav>
    <div class="sidebar-footer">Backend Intermedio · MySQL Employees</div>
  </aside>

  <!-- ── Main ── -->
  <div class="main">
    <header class="topbar">
      <h1>👥 Empleados</h1>
      <div id="weather-widget">Cargando clima...</div>
    </header>

    <div class="content">
      <div class="card">
        <div class="card-header">
          <h2>Catálogo de empleados</h2>
          <div class="search-bar">
            <input type="text" id="search-input" placeholder="Buscar por nombre o ID…">
            <button class="btn btn-primary" id="btn-search">🔍 Buscar</button>
            <button class="btn btn-secondary" id="btn-clear">✕ Limpiar</button>
          </div>
        </div>

        <div id="table-container">
          <div class="loading"><div class="spinner"></div> Cargando empleados...</div>
        </div>

        <div id="pagination-container" class="pagination" style="padding:16px"></div>
      </div>
    </div>
  </div>

  <div id="toast-container"></div>

  <script src="js/api.js"></script>
  <script src="js/weather.js"></script>
  <script src="js/employees.js"></script>
</body>
</html>
